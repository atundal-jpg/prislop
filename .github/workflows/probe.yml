name: probe

# Gjenbrukbar diagnose-workflow. Velg hvilket probe-script som skal kjøres fra
# nedtrekksmenyen ved "Run workflow". Kjører kun manuelt, skriver ingenting til
# DB, trenger ingen secrets.
on:
  workflow_dispatch:
    inputs:
      script:
        description: "Hvilket probe-script skal kjøres?"
        type: choice
        required: true
        default: probe_sportholding_listing.py
        options:
          - probe_sportholding_listing.py
          - probe_sportholding.py
          - probe_loplabbet_pages.py

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjør probe (${{ inputs.script }})
        working-directory: scraper
        run: python "${{ inputs.script }}"
