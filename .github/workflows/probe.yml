name: probe-sportholding

# Engangs-diagnose. Kjøres kun manuelt (ingen schedule).
# Skriver ingenting til DB; trenger ingen secrets. Slett trygt etterpå.
on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjør probe
        working-directory: scraper
        run: python probe_sportholding.py
