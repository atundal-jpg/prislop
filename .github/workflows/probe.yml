name: probe

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Hvilket probe-script skal kjøres?"
        type: choice
        required: true
        default: probe_olympia.py
        options:
          - probe_brukas.py
          - probe_bull_es.py
          - probe_sportholding_listing.py
          - probe_foss.py
          - probe_olympia.py

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Kjør probe (${{ inputs.script }})
        working-directory: scraper
        run: python "${{ inputs.script }}"
