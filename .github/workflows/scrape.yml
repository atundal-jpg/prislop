name: scrape-prislop

# Kjører hver 6. time + manuelt fra Actions-fanen.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

# Unngå overlappende kjøringer
concurrency:
  group: scrape-prislop
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Høst og last inn
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python run_pipeline.py
